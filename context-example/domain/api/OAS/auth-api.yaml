openapi: 3.1.0
info:
  title: Authentication API
  description: |
    API for user authentication and authorization in the banking system.
    This API handles user registration, login, password management, and token-based authentication.
  version: "1.0.0"
  contact:
    name: API Support
    email: support@bankingsystem.com

servers:
  - url: https://api.bankingsystem.com/v1
    description: Production server
  - url: https://staging-api.bankingsystem.com/v1
    description: Staging server

paths:
  /auth/register:
    post:
      summary: Register a new user
      description: Creates a new user account in the system.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistration"
      responses:
        "201":
          description: User successfully registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Username or email already exists
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/login:
    post:
      summary: User login
      description: Authenticates a user and returns an access token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Invalid credentials
        "403":
          description: Account locked or disabled
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/refresh:
    post:
      summary: Refresh authentication token
      description: Issues a new access token using a valid refresh token.
      tags:
        - Authentication
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Invalid or expired refresh token
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/password/reset:
    post:
      summary: Request password reset
      description: Initiates the password reset process for a user.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Password reset email sent
        "404":
          description: Email not found
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/password/confirm:
    post:
      summary: Confirm password reset
      description: Completes the password reset process with a reset token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resetToken:
                  type: string
                newPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Password successfully reset
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid or expired reset token
        "500":
          $ref: "#/components/responses/ServerError"

components:
  schemas:
    UserRegistration:
      type: object
      required:
        - username
        - email
        - password
        - firstName
        - lastName
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, one number, and one special character
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date
        phoneNumber:
          type: string
        address:
          type: string

    LoginCredentials:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Can be either username or email
        password:
          type: string
          format: password

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Token expiration time in seconds
        tokenType:
          type: string
          example: Bearer

  responses:
    BadRequest:
      description: Bad request due to invalid input
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    message:
                      type: string

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
              message:
                type: string

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the /auth/login endpoint

security:
  - BearerAuth: []

tags:
  - name: Authentication
    description: Authentication and user management operations
